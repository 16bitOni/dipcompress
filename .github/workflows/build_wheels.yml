name: Build & publish

on:
  push:
    tags:
      - "v*"          # runs on every version tag, e.g. v0.1.0
  workflow_dispatch:  # lets you trigger it manually from the GitHub UI

jobs:
  # ── Build wheels for every platform ────────────────────────────────────
  build_wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Python versions to build for
          CIBW_BUILD: cp311-* cp312-*

          # Architectures
          CIBW_ARCHS_LINUX:   x86_64
          CIBW_ARCHS_MACOS:   x86_64 arm64
          CIBW_ARCHS_WINDOWS: AMD64

          # Skip PyPy and 32-bit Windows
          CIBW_SKIP: pp* *-win32

          # Smoke-test every wheel after building
          CIBW_TEST_REQUIRES: pillow numpy
          CIBW_TEST_COMMAND: "python -c \"from dipcompress import compress, decompress; from dipcompress.lz77_fast import using_c; assert using_c, 'C extension did not load'; print('C extension OK')\""

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build the pure-Python sdist (source distribution) ──────────────────
  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish everything to PyPI on a version tag ─────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/dipcompress
    permissions:
      id-token: write   # required for PyPI trusted publishing (no API token needed)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
